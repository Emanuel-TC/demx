name: Run Daily News Briefing

on:
  schedule:
    # Se ejecuta todos los días a las 07:30 UTC (Ajusta según tu zona horaria)
    - cron: '30 8 * * *'
  workflow_dispatch: # Te permite ejecutarlo manualmente desde la web de GitHub para hacer pruebas

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Ejecutar Agente de Noticias
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
